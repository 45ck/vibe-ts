name: guardrails

on:
  pull_request:
  push:
  merge_group:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block unreviewed quality-gate changes
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          EVENT_NAME="${{ github.event_name }}"

          if [ "$EVENT_NAME" = "merge_group" ]; then
            echo "Skipping guardrails for merge_group event."
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request" ] && \
            [ "${{ github.event.pull_request.base.ref }}" != "$DEFAULT_BRANCH" ]; then
            echo "Skipping guardrails: not targeting default branch."
            exit 0
          fi

          if [ "$EVENT_NAME" = "push" ] && \
            [ "${{ github.ref_name }}" != "$DEFAULT_BRANCH" ]; then
            echo "Skipping guardrails: push target is not default branch."
            exit 0
          fi

          relevant_file=false
          CHANGED_FILES=""

          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --depth=1 origin "${{ github.event.pull_request.base.ref }}"
            CHANGED_FILES="$(git diff --name-only "origin/${{ github.event.pull_request.base.ref }}" "${{ github.sha }}")"
          else
            if [ "${GITHUB_EVENT_BEFORE}" = "0000000000000000000000000000000000000000" ] || [ -z "${GITHUB_EVENT_BEFORE}" ]; then
              relevant_file=true
            else
              CHANGED_FILES="$(git diff --name-only "$GITHUB_EVENT_BEFORE" "$GITHUB_SHA")"
            fi
          fi

          if [ "$relevant_file" = false ]; then
            while IFS= read -r file; do
              case "$file" in
                ".beads/hooks/"*|".github/"*|".claude/"*|".agent-docs/"*|
                "eslint.config.mjs"|"vitest.config.ts"|".dependency-cruiser.cjs"|
                "tsconfig.json"|"tsconfig.build.json"|"tsconfig.base.json"|".prettierrc"|"cspell.json")
                  relevant_file=true
                  ;;
              esac
            done <<< "$CHANGED_FILES"
          fi

          if [ "$relevant_file" = false ]; then
            echo "Skipping guardrails: no protected quality-gate files changed."
            exit 0
          fi

          if [ "$EVENT_NAME" = "push" ]; then
            echo "::error::Direct pushes to protected quality-gate files are blocked."
            echo "::error::Use a pull request with 'noslop-approved' approval to change hook/quality-policy files."
            exit 1
          fi

          echo "::error::This PR modifies protected quality gate or hook files."
          echo "::error::Add the 'noslop-approved' label to proceed."
          if ! gh pr view "${{ github.event.pull_request.number }}" --json labels \
            --jq '.labels[].name' | grep -q 'noslop-approved'; then
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
