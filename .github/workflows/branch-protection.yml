name: branch-protection

on:
  push:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Target branch to verify or enforce'
        required: false
        default: ''
      apply:
        description: 'Apply/normalize policy instead of verification'
        required: false
        default: 'false'
      contexts:
        description: 'Comma-separated required status checks (defaults: quality,guardrails)'
        required: false
        default: 'quality,guardrails'
      approvals:
        description: 'Required PR approvals'
        required: false
        default: '1'

jobs:
  verify-protection:
    if: github.event_name != 'push' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      administration: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build args
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          CONTEXTS="${{ github.event.inputs.contexts }}"
          APPROVALS="${{ github.event.inputs.approvals }}"
          EVENT_NAME="${{ github.event_name }}"
          APPLY="${{ github.event.inputs.apply }}"

          COMMAND_ARGS=(--repo "$GITHUB_REPOSITORY")
          if [ -n "$BRANCH" ]; then COMMAND_ARGS+=(--branch "$BRANCH"); fi
          if [ -n "$CONTEXTS" ]; then COMMAND_ARGS+=(--contexts "$CONTEXTS"); fi
          if [ -n "$APPROVALS" ]; then COMMAND_ARGS+=(--approvals "$APPROVALS"); fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$APPLY" = "true" ]; then
            COMMAND_ARGS+=(--apply)
          fi

          echo "Running: npm run admin:branch-protection -- ${COMMAND_ARGS[*]}"
          npm run admin:branch-protection -- "${COMMAND_ARGS[@]}"
        env:
          GH_TOKEN: ${{ github.token }}
